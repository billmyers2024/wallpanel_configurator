<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smartpanel Controller v{{ version }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/controller.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <h1><i class="fas fa-sliders-h"></i> Smartpanel Controller</h1>
                <span class="version">v{{ version }}</span>
            </div>
            <div class="header-right">
                <a href="/" class="btn btn-secondary">
                    <i class="fas fa-cogs"></i> Configurator
                </a>
            </div>
        </header>

        <!-- Main Content -->
        <main class="controller-main">
            <!-- Device Selector -->
            <section class="device-section">
                <label for="device-select"><i class="fas fa-microchip"></i> Panel</label>
                <select id="device-select">
                    <option value="">Loading devices...</option>
                </select>
                <span id="device-status" class="status-indicator offline">Offline</span>
            </section>

            <!-- EQ Section -->
            <section class="eq-section">
                <div class="eq-header">
                    <h2><i class="fas fa-wave-square"></i> Parametric EQ</h2>
                    <label class="toggle-switch">
                        <input type="checkbox" id="eq-master-enable">
                        <span class="slider-toggle"></span>
                        <span class="toggle-label">EQ On</span>
                    </label>
                </div>

                <!-- EQ Bands -->
                <div class="bands-container" id="bands-container">
                    <!-- Bands generated by JS -->
                </div>

                <!-- Actions -->
                <div class="eq-actions">
                    <button class="btn btn-primary" id="btn-send-eq">
                        <i class="fas fa-paper-plane"></i> Send to Panel
                    </button>
                    <button class="btn btn-success" id="btn-save-eq">
                        <i class="fas fa-save"></i> Save to Config
                    </button>
                    <button class="btn btn-warning" id="btn-load-ref">
                        <i class="fas fa-file-import"></i> Load Reference Curve
                    </button>
                    <input type="file" id="ref-file-input" accept=".txt,.csv,.mdat" style="display:none">
                </div>
            </section>

            <!-- Visualization -->
            <section class="viz-section">
                <div class="viz-header">
                    <h3>Frequency Response</h3>
                    <div class="viz-legend">
                        <span class="legend-item ref"><span class="dot"></span> Speaker Reference</span>
                        <span class="legend-item eq"><span class="dot"></span> EQ Curve</span>
                        <span class="legend-item net"><span class="dot"></span> Net Response</span>
                    </div>
                </div>
                <canvas id="eq-canvas" width="900" height="400"></canvas>
            </section>
        </main>
    </div>

    <!-- Toast container -->
    <div id="toast-container"></div>

    <script src="{{ url_for('static', filename='js/controller.js') }}"></script>
</body>
</html>
